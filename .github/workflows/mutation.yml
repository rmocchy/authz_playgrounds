# Mutation testing via StrykerJS. Score gate = Stryker thresholds.break.
# Per-job Job Summary + sticky PR comment (aggregated) + HTML/JSON artifacts.
name: Mutation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  mutate:
    name: ${{ matrix.service }}-${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: memo
            target: domain
            timeout: 15
          - service: memo
            target: http
            timeout: 45
          - service: auth
            target: domain
            timeout: 60
          - service: auth
            target: http
            timeout: 60
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ matrix.service }}-${{ runner.os }}-${{ hashFiles(format('services/{0}/deno.lock', matrix.service), format('services/{0}/deno.json', matrix.service)) }}
          restore-keys: |
            deno-${{ matrix.service }}-${{ runner.os }}-
      - run: npm ci
      - run: npm run mutate:${{ matrix.target }}
      - name: Mutation score
        if: always()
        run: >
          bash ../../tools/ci/mutation-report.sh
          ${{ matrix.service }}-${{ matrix.target }}
          reports/mutation/${{ matrix.target }}/mutation.json
          reports/mutation/${{ matrix.target }}/${{ matrix.service }}-${{ matrix.target }}-metrics.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-${{ matrix.service }}-${{ matrix.target }}-${{ github.run_id }}
          path: services/${{ matrix.service }}/reports/mutation/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 14

  mutation-summary:
    name: Mutation summary
    needs: [mutate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download mutation reports
        uses: actions/download-artifact@v4
        with:
          pattern: mutation-*-${{ github.run_id }}
          path: metrics-in
          merge-multiple: false
      - name: Aggregate
        run: bash tools/ci/aggregate-metrics.sh "Mutation test scores" metrics-in mutation-summary.md
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/ci/post-pr-comment.sh "<!-- ci-mutation-scores -->" mutation-summary.md
