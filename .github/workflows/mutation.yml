# Mutation testing via StrykerJS. Score gate = Stryker thresholds.break.
# Reports are Stryker HTML/JSON artifacts (no custom metrics glue).
name: Mutation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutate:
    name: ${{ matrix.service }}-${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: memo
            target: domain
            timeout: 15
          - service: memo
            target: http
            timeout: 45
          - service: auth
            target: domain
            timeout: 60
          - service: auth
            target: http
            timeout: 60
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ matrix.service }}-${{ runner.os }}-${{ hashFiles(format('services/{0}/deno.lock', matrix.service), format('services/{0}/deno.json', matrix.service)) }}
          restore-keys: |
            deno-${{ matrix.service }}-${{ runner.os }}-
      - run: npm ci
      - run: npm run mutate:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-${{ matrix.service }}-${{ matrix.target }}-${{ github.run_id }}
          path: services/${{ matrix.service }}/reports/mutation/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 14
