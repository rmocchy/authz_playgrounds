# Unit / typecheck / coverage CI for Auth, Memo, Web, and shared api-client.
# Mutation (Stryker) runs in a separate workflow: .github/workflows/mutation.yml
name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auth:
    name: Auth (Deno tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
          key: deno-auth-${{ runner.os }}-${{ hashFiles('services/auth/deno.lock', 'services/auth/deno.json') }}
          restore-keys: |
            deno-auth-${{ runner.os }}-
      - name: Typecheck
        run: deno task check
      - name: Test with coverage
        run: deno test -A --coverage=coverage tests/
      - name: Coverage report
        if: always()
        run: bash ../../tools/ci/coverage-report.sh auth coverage coverage-metrics.json
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-auth-${{ github.run_id }}
          path: |
            services/auth/coverage/html/
            services/auth/coverage/lcov.info
            services/auth/coverage-metrics.json
          if-no-files-found: warn
          retention-days: 14

  memo:
    name: Memo (Deno tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/memo
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
          key: deno-memo-${{ runner.os }}-${{ hashFiles('services/memo/deno.lock', 'services/memo/deno.json') }}
          restore-keys: |
            deno-memo-${{ runner.os }}-
      - name: Typecheck
        run: deno task check
      - name: Test with coverage
        run: deno test -A --coverage=coverage tests/
      - name: Coverage report
        if: always()
        run: bash ../../tools/ci/coverage-report.sh memo coverage coverage-metrics.json
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-memo-${{ github.run_id }}
          path: |
            services/memo/coverage/html/
            services/memo/coverage/lcov.info
            services/memo/coverage-metrics.json
          if-no-files-found: warn
          retention-days: 14

  api-client:
    name: api-client (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check
        run: deno check pkg/api-client/mod.ts
      - name: Test with coverage
        run: deno test -A --coverage=pkg/api-client/coverage pkg/api-client/
      - name: Coverage report
        if: always()
        run: bash tools/ci/coverage-report.sh api-client pkg/api-client/coverage pkg/api-client/coverage-metrics.json
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-client-${{ github.run_id }}
          path: |
            pkg/api-client/coverage/html/
            pkg/api-client/coverage/lcov.info
            pkg/api-client/coverage-metrics.json
          if-no-files-found: warn
          retention-days: 14

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Build
        run: npm run build

  coverage-summary:
    name: Coverage summary
    needs: [auth, memo, api-client]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage metrics
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*-${{ github.run_id }}
          path: metrics-in
          merge-multiple: true
      - name: Aggregate
        run: bash tools/ci/aggregate-metrics.sh "Test coverage" metrics-in coverage-summary.md
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/ci/post-pr-comment.sh "<!-- ci-test-coverage -->" coverage-summary.md
