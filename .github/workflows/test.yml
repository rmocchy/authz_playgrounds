# Unit / typecheck / coverage / strict lint for Auth, Memo, Web, and api-client.
# Mutation (StrykerJS) runs in a separate workflow: .github/workflows/mutation.yml
# Coverage: per-job Job Summary + sticky PR comment (aggregated) + HTML/LCOV artifacts.
name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (fmt + deno lint + ESLint + Biome + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run fmt:deno:check
      - run: npm run lint:deno
      - run: npm run lint:eslint
      - run: npm run lint:web
      # gitleaks/gitleaks-action — personal public repos need no GITLEAKS_LICENSE.
      # Config: .gitleaks.toml (GITLEAKS_CONFIG). Local: npm run lint:secrets (CLI).
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          # Align with local brew / documented CLI (action default can lag).
          GITLEAKS_VERSION: "8.30.1"

  deno-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Auth (Deno tests)
            workdir: services/auth
            cache_key: deno-auth
            lock: services/auth/deno.lock
            conf: services/auth/deno.json
            check: deno task check
            test: deno test -A --coverage=coverage tests/
            cov_dir: coverage
            cov_root: services/auth/coverage
            label: auth
            report: bash ../../tools/ci/coverage-report.sh auth coverage coverage/auth-metrics.json
            metrics: services/auth/coverage/auth-metrics.json
            artifact: coverage-auth
          - name: Memo (Deno tests)
            workdir: services/memo
            cache_key: deno-memo
            lock: services/memo/deno.lock
            conf: services/memo/deno.json
            check: deno task check
            test: deno test -A --coverage=coverage tests/
            cov_dir: coverage
            cov_root: services/memo/coverage
            label: memo
            report: bash ../../tools/ci/coverage-report.sh memo coverage coverage/memo-metrics.json
            metrics: services/memo/coverage/memo-metrics.json
            artifact: coverage-memo
          - name: api-client (Deno)
            workdir: .
            cache_key: deno-api-client
            lock: pkg/api-client/deno.lock
            conf: pkg/api-client/deno.json
            check: deno check --config pkg/api-client/deno.json pkg/api-client/mod.ts
            test: deno test -A --config pkg/api-client/deno.json --coverage=pkg/api-client/coverage pkg/api-client/
            cov_dir: pkg/api-client/coverage
            cov_root: pkg/api-client/coverage
            label: api-client
            report: bash tools/ci/coverage-report.sh api-client pkg/api-client/coverage pkg/api-client/coverage/api-client-metrics.json
            metrics: pkg/api-client/coverage/api-client-metrics.json
            artifact: coverage-api-client
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ matrix.cache_key }}-${{ runner.os }}-${{ hashFiles(matrix.lock, matrix.conf) }}
          restore-keys: |
            ${{ matrix.cache_key }}-${{ runner.os }}-
      - name: Typecheck
        run: ${{ matrix.check }}
      - name: Test with coverage
        run: ${{ matrix.test }}
      - name: Coverage report
        if: always()
        run: ${{ matrix.report }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact }}-${{ github.run_id }}
          path: |
            ${{ matrix.cov_root }}/html/
            ${{ matrix.cov_root }}/lcov.info
            ${{ matrix.metrics }}
          if-no-files-found: warn
          retention-days: 14

  web:
    name: Web (typecheck + build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/web/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: services/web
      - run: npm run lint:web
      - run: npm run check
        working-directory: services/web
      - run: npm run build
        working-directory: services/web

  coverage-summary:
    name: Coverage summary
    needs: [deno-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage metrics
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*-${{ github.run_id }}
          path: metrics-in
          merge-multiple: false
      - name: Aggregate
        run: bash tools/ci/aggregate-metrics.sh "Test coverage" metrics-in coverage-summary.md
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/ci/post-pr-comment.sh "<!-- ci-test-coverage -->" coverage-summary.md
