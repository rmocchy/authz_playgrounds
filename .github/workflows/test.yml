# Unit / typecheck / strict lint (Deno fmt+lint, ESLint, Biome) for Auth, Memo, Web, api-client.
# Mutation (StrykerJS) runs in a separate workflow: .github/workflows/mutation.yml
name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (fmt + deno lint + ESLint + Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root tooling
        run: npm ci
      - name: Deno format check
        run: npm run fmt:deno:check
      - name: Deno lint
        run: npm run lint:deno
      - name: ESLint (backend strict)
        run: npm run lint:eslint
      - name: Biome (web)
        run: npm run lint:web

  auth:
    name: Auth (Deno tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
          key: deno-auth-${{ runner.os }}-${{ hashFiles('services/auth/deno.lock', 'services/auth/deno.json') }}
          restore-keys: |
            deno-auth-${{ runner.os }}-
      - name: Typecheck
        run: deno task check
      - name: Test
        run: deno task test

  memo:
    name: Memo (Deno tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/memo
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
          key: deno-memo-${{ runner.os }}-${{ hashFiles('services/memo/deno.lock', 'services/memo/deno.json') }}
          restore-keys: |
            deno-memo-${{ runner.os }}-
      - name: Typecheck
        run: deno task check
      - name: Test
        run: deno task test

  api-client:
    name: api-client (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check
        run: deno check --config pkg/api-client/deno.json pkg/api-client/mod.ts
      - name: Test
        run: deno test -A --config pkg/api-client/deno.json pkg/api-client/

  web:
    name: Web (typecheck + build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/web/package-lock.json
      - name: Install root (Biome)
        run: npm ci
      - name: Install web
        working-directory: services/web
        run: npm ci
      - name: Biome
        run: npm run lint:web
      - name: Typecheck
        working-directory: services/web
        run: npm run check
      - name: Build
        working-directory: services/web
        run: npm run build
