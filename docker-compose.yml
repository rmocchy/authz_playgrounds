# Authz Playgrounds — local stack
# Services: auth (app authz platform), memo, web, db
# Full app behavior lands in later PRs; stubs keep compose valid.

services:
  db:
    image: postgres:16-alpine
    container_name: authz-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playground} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: authz-auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-3001}:3001"
    environment:
      PORT: ${AUTH_PORT:-3001}
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://playground:changeme@db:5432/auth}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-playground_session}
    depends_on:
      db:
        condition: service_healthy

  memo:
    build:
      context: ./services/memo
      dockerfile: Dockerfile
    container_name: authz-memo
    restart: unless-stopped
    ports:
      - "${MEMO_PORT:-3002}:3002"
    environment:
      PORT: ${MEMO_PORT:-3002}
      DATABASE_URL: ${MEMO_DATABASE_URL:-postgres://playground:changeme@db:5432/memo}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://auth:3001}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-playground_session}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: authz-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      PORT: ${WEB_PORT:-5173}
      # Vite proxy targets (used once FE is implemented)
      AUTH_PROXY_TARGET: http://auth:3001
      MEMO_PROXY_TARGET: http://memo:3002
    depends_on:
      - auth
      - memo

volumes:
  postgres_data:
