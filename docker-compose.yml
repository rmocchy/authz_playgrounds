# Authz Playgrounds — local stack
# Services: auth (app authz platform), memo, web, db, migrate-*
#
# Port contract:
# - Container-internal listen ports are fixed (auth 3001, memo 3002, web 5173, db 5432).
# - AUTH_PORT / MEMO_PORT / WEB_PORT / POSTGRES_PORT only remap the host publish side.
# - Inter-service URLs always use compose DNS + internal ports (e.g. http://auth:3001).

x-dbmate: &dbmate
  image: amacneil/dbmate:2.34.1
  restart: "no"
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    container_name: authz-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playground} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Schema migrations (dbmate). Auth/Memo apps do not run SQL migrations themselves.
  migrate-auth:
    <<: *dbmate
    container_name: authz-migrate-auth
    volumes:
      - ./db/migration/auth:/migrations:ro
    environment:
      # Local Postgres has no TLS; dbmate requires sslmode=disable.
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://playground:changeme@db:5432/auth?sslmode=disable}
    entrypoint: ["dbmate", "--migrations-dir", "/migrations", "--no-dump-schema"]
    command: ["up"]

  migrate-memo:
    <<: *dbmate
    container_name: authz-migrate-memo
    volumes:
      - ./db/migration/memo:/migrations:ro
    environment:
      DATABASE_URL: ${MEMO_DATABASE_URL:-postgres://playground:changeme@db:5432/memo?sslmode=disable}
    entrypoint: ["dbmate", "--migrations-dir", "/migrations", "--no-dump-schema"]
    command: ["up"]

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: authz-auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-3001}:3001"
    environment:
      # Fixed container listen port (not AUTH_PORT — that is host-only)
      PORT: "3001"
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://playground:changeme@db:5432/auth?sslmode=disable}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-playground_session}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Optional local seed (example password only — not for production)
      SEED_LOGIN_ID: ${SEED_LOGIN_ID:-}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "const r=await fetch('http://127.0.0.1:3001/health'); if(!r.ok) Deno.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully

  memo:
    build:
      context: .
      dockerfile: services/memo/Dockerfile
    container_name: authz-memo
    restart: unless-stopped
    ports:
      - "${MEMO_PORT:-3002}:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: ${MEMO_DATABASE_URL:-postgres://playground:changeme@db:5432/memo?sslmode=disable}
      # Compose-network hostname + fixed internal Auth port
      AUTH_BASE_URL: http://auth:3001
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-playground_session}
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "const r=await fetch('http://127.0.0.1:3002/health'); if(!r.ok) Deno.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      migrate-memo:
        condition: service_completed_successfully
      auth:
        condition: service_started

  web:
    build:
      # Repo root so Dockerfile can COPY pkg/api-client
      context: .
      dockerfile: services/web/Dockerfile
    container_name: authz-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      PORT: "5173"
      # Compose-network hostnames + fixed internal ports (Vite proxy)
      AUTH_PROXY_TARGET: http://auth:3001
      MEMO_PROXY_TARGET: http://memo:3002
    depends_on:
      - auth
      - memo

volumes:
  postgres_data:
